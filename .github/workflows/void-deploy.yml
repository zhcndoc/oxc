name: Deploy to Void

permissions:
  id-token: write # Required for the OIDC exchange performed by `void deploy`.
  contents: read

on:
  push:
    branches:
      - main

# Latest push wins: a newer commit cancels an in-flight deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Void
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          cache: true
      - run: vp run void deploy
        env:
          VOID_PROJECT: oxc
